name: tests

on: [push, pull_request]

jobs:
  pytest:
    runs-on: ubuntu-latest
    env:
      MPLBACKEND: Agg
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -e ".[test,shadowmap]"
      - run: pytest -v -s
